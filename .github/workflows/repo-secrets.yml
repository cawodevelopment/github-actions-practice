name: Repo Secrets

on:
  push:
  workflow_dispatch:

jobs:
  check-secrets:
    runs-on: ubuntu-latest

    steps:
      - name: Check for required secrets
        run: |
          if [ -z "${{ secrets.MY_SECRET }}" ]; then
            echo "Error: MY_SECRET is not set in repository secrets."
            exit 1
          fi
          echo "All required secrets are set."